<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo | Brillo Express</title>
    <style>
        :root {
            --primary: #0a3d62;
            --accent: #ff9800;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a3d62 0%, #1e88e5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 { color: var(--primary); margin-bottom: 10px; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #e68900; transform: translateY(-2px); }
        #error-msg {
            color: #d63031;
            font-size: 0.8rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Panel de Control</h2>
        <p>Ingrese las credenciales asignadas</p>
        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="usuario" placeholder="Ej: esanders">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="validarAcceso()">Entrar al Sistema</button>
        <div id="error-msg">❌ Usuario o clave incorrectos. Intente de nuevo.</div>
    </div>

    <script>
        function validarAcceso() {
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');

            // Esta línea es la que hace la magia de llevarte a la otra página
            if (user === "esanders" && pass === "Uth2@261!") {
                window.location.href = "inicio.html";
            } else {
                error.style.display = "block";
                document.getElementById('password').value = "";
            }
        }
    </script>
</body>
</html>
